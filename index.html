<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bookstore</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    #search {
      width: 300px;
      padding: 8px;
      margin-bottom: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .book {
      background: white;
      padding: 15px;
      margin: 10px auto;
      width: 60%;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .book:hover {
      transform: scale(1.03);
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .price {
      color: green;
    }
  </style>
</head>
<body>

<h1>📚 Bookstore</h1>

<input type="text" id="search" placeholder="Search books...">

<div id="booksContainer"></div>

<script>
  let allBooks = [];

  fetch("books.xml")
    .then(response => response.text())
    .then(data => {
      const parser = new DOMParser();
      const xml = parser.parseFromString(data, "application/xml");
      const books = xml.getElementsByTagName("book");

      allBooks = Array.from(books).map(book => ({
        title: book.getElementsByTagName("title")[0].textContent,
        author: book.getElementsByTagName("author")[0].textContent,
        price: book.getElementsByTagName("price")[0].textContent
      }));

      displayBooks(allBooks);
    });

  function displayBooks(books) {
    const container = document.getElementById("booksContainer");
    container.innerHTML = "";

    books.forEach(book => {
      const div = document.createElement("div");
      div.className = "book";

      div.innerHTML = `
        <div class="title">${book.title}</div>
        <div>Author: ${book.author}</div>
        <div class="price">Price: ₹${book.price}</div>
      `;

      container.appendChild(div);
    });
  }

  // 🔍 Search functionality
  document.getElementById("search").addEventListener("input", function () {
    const value = this.value.toLowerCase();

    const filtered = allBooks.filter(book =>
      book.title.toLowerCase().includes(value) ||
      book.author.toLowerCase().includes(value)
    );

    displayBooks(filtered);
  });
</script>

</body>
</html>
